<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <clipPath id="round">
      <rect x="0" y="0" width="100" height="100" rx="18" />
    </clipPath>
  </defs>
  <g clip-path="url(#round)">
    <!-- Brand Colors -->
    <rect x="0" y="0" width="50" height="100" fill="#c8102e" />
    <rect x="50" y="0" width="50" height="100" fill="#1b2e6b" />
    
    <!-- Bold Typography to exactly match the provided logo crop -->
    <text x="25" y="72" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="62" text-anchor="middle">E</text>
    <text x="75" y="72" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="62" text-anchor="middle">P</text>
  </g>
</svg>
