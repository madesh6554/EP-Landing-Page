<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F3E5F5" />
      <stop offset="100%" stop-color="#E1BEE7" />
    </linearGradient>

    <linearGradient id="iconGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8E24AA" />
      <stop offset="100%" stop-color="#4A148C" />
    </linearGradient>

    <filter id="shadow3" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#6A1B9A" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad3)" />
  
  <circle cx="400" cy="200" r="120" fill="#FFF" opacity="0.4" filter="blur(30px)" />

  <!-- Microphone -->
  <g transform="translate(400, 200)" filter="url(#shadow3)">
    <!-- Stand -->
    <rect x="-6" y="50" width="12" height="40" rx="4" fill="url(#iconGrad3)" />
    <path d="M -30,90 L 30,90" stroke="url(#iconGrad3)" stroke-width="12" stroke-linecap="round" />
    
    <!-- U shape holder -->
    <path d="M -40,10 A 40,40 0 0 0 40,10" fill="none" stroke="url(#iconGrad3)" stroke-width="12" stroke-linecap="round" />
    
    <!-- Mic body -->
    <rect x="-24" y="-70" width="48" height="90" rx="24" fill="#FFF" />
    
    <!-- Inner Mic details -->
    <line x1="-24" y1="-30" x2="24" y2="-30" stroke="url(#iconGrad3)" stroke-width="4" opacity="0.4"/>
    <line x1="-24" y1="-10" x2="24" y2="-10" stroke="url(#iconGrad3)" stroke-width="4" opacity="0.4"/>
    <circle cx="0" cy="-45" r="12" fill="url(#iconGrad3)" />
  </g>
</svg>
