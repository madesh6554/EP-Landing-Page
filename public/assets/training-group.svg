<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E3F2FD" />
      <stop offset="100%" stop-color="#BBDEFB" />
    </linearGradient>

    <linearGradient id="iconGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E88E5" />
      <stop offset="100%" stop-color="#0D47A1" />
    </linearGradient>

    <filter id="shadow2" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#1565C0" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#bgGrad2)" />
  
  <circle cx="400" cy="200" r="120" fill="#FFF" opacity="0.4" filter="blur(30px)" />

  <!-- Chat Bubbles -->
  <g transform="translate(400, 200)" filter="url(#shadow2)">
    <!-- Back bubble -->
    <path d="M 10,-40 C 50,-40 80,-10 80,30 C 80,70 50,100 10,100 C -10,100 -30,90 -45,80 L -70,90 L -60,65 C -75,50 -80,30 -80,10 C -80,-30 -50,-40 10,-40 Z" fill="#FFF" opacity="0.9" transform="scale(0.8) translate(-40, -20)"/>
    
    <!-- Front bubble -->
    <path d="M 0,-60 C 40,-60 75,-30 75,10 C 75,50 40,80 0,80 C -15,80 -30,75 -40,65 L -65,75 L -55,50 C -70,35 -75,15 -75,-10 C -75,-50 -40,-60 0,-60 Z" fill="url(#iconGrad2)" />
    
    <!-- Dots inside -->
    <circle cx="-25" cy="10" r="7" fill="#FFF" />
    <circle cx="0" cy="10" r="7" fill="#FFF" />
    <circle cx="25" cy="10" r="7" fill="#FFF" />
  </g>
</svg>
